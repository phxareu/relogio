<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Kindle Paisagem Gigante</title>
    <style>
        body { 
            background-color: white; 
            color: black; 
            font-family: Arial, Helvetica, sans-serif; 
            text-align: center; 
            margin: 0;
            padding: 0;
            display: block;
            width: 100vw;
            overflow: hidden;
        }
        #relogio { 
            font-size: 19vw; 
            font-weight: 900; 
            line-height: 0.95;
            margin-top: 2vh;
        }
        #data { 
            font-size: 3.5vw; 
            font-weight: bold;
            margin-top: 0px; 
            margin-bottom: 15px; 
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        #clima-container {
            margin: 0 auto;
            max-width: 85%;
        }
        img { 
            max-width: 100%; 
            height: auto; 
            filter: grayscale(100%); 
        }
    </style>
</head>
<body>

    <div id="relogio">00:00</div>
    <div id="data">CARREGANDO...</div>

    <div id="clima-container">
        <img src="https://wttr.in/Guarapari_2m_lang=pt.png" alt="Previsão do Tempo">
    </div>

    <script>
        function iniciarRelogio() {
            var agora = new Date();
            var horaBrasilia = agora.toLocaleTimeString('pt-BR', { timeZone: 'America/Sao_Paulo', hour: '2-digit', minute: '2-digit' });
            document.getElementById('relogio').textContent = horaBrasilia;
            
            var formatoData = { timeZone: 'America/Sao_Paulo', weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric' };
            document.getElementById('data').textContent = agora.toLocaleDateString('pt-BR', formatoData);
        }
        setInterval(iniciarRelogio, 1000);
        iniciarRelogio();
    </script>

</body>
</html>
