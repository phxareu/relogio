<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Kindle</title>
    <style>
        body { 
            background-color: white; 
            color: black; 
            font-family: monospace; 
            text-align: center; 
            padding-top: 5vh; 
        }
        #relogio { font-size: 100px; font-weight: bold; }
        #data { font-size: 24px; margin-top: 10px; margin-bottom: 30px; }
        iframe { border: none; overflow: hidden; width: 350px; height: 220px; }
    </style>
</head>
<body>

    <div id="relogio">00:00</div>
    <div id="data">CARREGANDO...</div>

    <div>
        <iframe src="https://forecast7.com/pt/n20s66w40s50/guarapari/?unit=metric&theme=pure"></iframe>
    </div>

    <script>
        function iniciarRelogio() {
            var agora = new Date();
            var h = String(agora.getHours()).padStart(2, '0');
            var m = String(agora.getMinutes()).padStart(2, '0');
            document.getElementById('relogio').textContent = h + ':' + m;
            
            var formato = { weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric' };
            document.getElementById('data').textContent = agora.toLocaleDateString('pt-BR', formato).toUpperCase();
        }
        setInterval(iniciarRelogio, 1000);
        iniciarRelogio();
    </script>

</body>
</html>
